name: Enforce Issue Checkboxes
on:
  issues:
    types: [opened, edited]

jobs:
  check-checkboxes:
    runs-on: ubuntu-latest
    steps:
      - name: Check all checkboxes
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueBody = context.payload.issue.body || "";
            const unchecked = (issueBody.match(/- \[ \]/g) || []).length;

            if (unchecked > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: `❌ Please complete all checkboxes before this issue can be processed. ${unchecked} incomplete.`
              });
              // Optionally add a label
              await github.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: ["incomplete"]
              });
              throw new Error("Not all checkboxes are checked.");
            }
