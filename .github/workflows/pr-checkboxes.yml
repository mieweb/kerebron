name: Enforce PR Checkboxes
on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-pr-checkboxes:
    runs-on: ubuntu-latest
    steps:
      - name: Validate issue reference
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const pattern = /(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#\d+/i;

            if (!pattern.test(body)) {
              core.setFailed(
                "❌ PR must reference an issue using `Closes #123` or `Fixes #123`."
              );
            }

      - name: Check PR body for unchecked boxes
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prBody = context.payload.pull_request.body || "";
            const unchecked = (prBody.match(/- \[ \]/g) || []).length;

            if (unchecked > 0) {
              await github.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `❌ Please complete all checklist items in the PR template before this can be merged. ${unchecked} incomplete.`
              });
              throw new Error("PR checklist incomplete.");
            }
