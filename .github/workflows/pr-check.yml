name: Check PR
on:
  pull_request:
    branches:
      - main

jobs:
  commit-message-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch full history
        run: git fetch --prune --unshallow

      - name: Check PR commit messages
        run: |
          echo "Checking commit messages in this PR..."
          INVALID=0
          for msg in $(git log --pretty=format:"%s" ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}); do
            if ! echo "$msg" | grep -E "^(feat|fix|chore|docs|test|refactor|ci|build)(\(.+\))?: .+" >/dev/null; then
              echo "::error ::Invalid commit message: '$msg'"
              INVALID=1
            fi
          done
          if [ $INVALID -eq 1 ]; then
            echo "::notice ::Please squash/fixup your commits and follow the Conventional Commit format:"
            echo "::notice ::<type>(scope): short description"
            echo "::notice ::Example: feat(ui): add dark mode toggle"
            exit 1
          fi

      - name: Reject trivial commits
        run: |
          echo "Checking PR commits for trivial messages..."

          # Fetch PR commits
          git fetch origin ${{ github.event.pull_request.base.ref }}
          COMMITS=$(git log --pretty=format:"%s" ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }})

          INVALID=0

          # Define array of trivial regex patterns
          TRIVIAL_REGEXES=(
            "(fix|chore).*(typo|wip)"
          )

          # Loop through commits
          for msg in $COMMITS; do
            for pattern in "${TRIVIAL_REGEXES[@]}"; do
              if echo "$msg" | grep -Ei "$pattern" >/dev/null; then
                echo "::error ::Trivial commit detected: '$msg'"
                INVALID=1
              fi
            done
          done

          if [ $INVALID -eq 1 ]; then
            echo "::notice ::Please squash/fixup trivial commits before merging."
            exit 1
          fi

  prepush-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x # Use the latest stable Deno version

      - name: Setup rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Deno install deps
        run: deno install

      - name: Build packages
        run: deno task build:all

      - name: Make pre-push hook executable
        run: chmod +x ./utils/hooks/pre-push

      - name: Run pre-push hook
        run: |
          if ! ./utils/hooks/pre-push; then
            echo "::error file=CONTRIBUTING.md,line=1,col=1::❌ Pre-push hook failed!"
            echo "::notice ::Run 'deno task postinstall' to install hooks and fix issues."
            exit 1
          fi
