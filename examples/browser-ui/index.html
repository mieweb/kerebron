<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UI tests</title>
    <style>
      @import '@kerebron/editor/assets/index.css';
      @import '@kerebron/editor-kits/assets/AdvancedEditorKit.css';
    </style>
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/bootstrap-dark-5@1.1.3/dist/css/bootstrap-night.min.css"
      media="(prefers-color-scheme: dark)"
    />
  </head>
  <body>
    <div class="col" id="editor"></div>
    <script defer type="module" src="./src/main.ts"></script>

    <div class="example-kb-z-dropdown">
      --kb-z-dropdown = <span data-css-val="kb-z-dropdown"></span>
    </div>
    <style>
      .example-kb-z-dropdown {
        position: absolute;
        top: 30px;
        height: 40vh;
        left: 70%;
        width: 30%;
        outline: 1px dotted red;
        z-index: var(--kb-z-dropdown);
        background: #a00000d0;
      }
    </style>
    <script>
      // then CSS cannot convert that numeric custom property into text for content. There is currently no CSS equivalent of:
      // content: toString(var(--kb-z-dropdown)); /* doesn't exist */
      document.querySelectorAll('[data-css-val]').forEach((el) => {
        const name = '--' + el.dataset.cssVal;
        el.textContent = getComputedStyle(document.documentElement)
          .getPropertyValue(name)
          .trim();
      });
    </script>
  </body>
</html>
